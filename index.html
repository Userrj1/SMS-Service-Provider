<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMS Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; }
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Service SMS Dashboard</h2>

<!-- Phone -->
<input id="phone" class="w-full border p-2 mb-3" placeholder="Enter phone number (91XXXXXXXXXX)" />

<!-- Name -->
<input id="name" class="w-full border p-2 mb-3" placeholder="Customer Name" />

<!-- Brand -->
<input id="brand" class="w-full border p-2 mb-3" placeholder="Brand (LG, Samsung, etc.)" />

<!-- Complaint -->
<input id="complaint" class="w-full border p-2 mb-3" placeholder="Complaint (AC not cooling)" />

<!-- Date -->
<input id="date" type="date" class="w-full border p-2 mb-3" />

<!-- Time -->
<input id="time" type="time" class="w-full border p-2 mb-3" />

<!-- Location -->
<input id="location" class="w-full border p-2 mb-3" placeholder="Location" />

<!-- Template -->
<select id="template" class="w-full border p-2 mb-3">
<option value="">Select Template</option>
<option value="service">Service Booking Confirmation</option>
</select>

<!-- Preview Message -->
<textarea id="message" class="w-full border p-2 mb-3" rows="6" placeholder="Message preview"></textarea>

<!-- Button -->
<button id="sendBtn" class="w-full bg-black text-white p-3 rounded">
Send SMS
</button>

</div>

<script>

// TEMPLATE SYSTEM (frontend preview only)
const templates = {
    service: `Hi {{name}},

Your {{brand}} service request has been registered.

Complaint: {{complaint}}
Date: {{date}}
Time: {{time}}
Location: {{location}}

Thank you for choosing us!`
};

// Fill template
document.getElementById("template").addEventListener("change", function () {
    const t = templates[this.value];

    if (t) {
        document.getElementById("message").value = t;
    }
});

// Send SMS
document.getElementById("sendBtn").addEventListener("click", async () => {

    const payload = {
        number: document.getElementById("phone").value,
        template: document.getElementById("message").value,

        name: document.getElementById("name").value,
        brand: document.getElementById("brand").value,
        complaint: document.getElementById("complaint").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        location: document.getElementById("location").value
    };

    if (!payload.number || !payload.template) {
        alert("Enter phone and message");
        return;
    }

    try {
        const res = await fetch("https://sms-service-provider.onrender.com/send-sms", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        alert(data.message);

    } catch (err) {
        alert("Error sending SMS");
        console.log(err);
    }
});

</script>

</body>
</html>
